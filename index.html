<!DOCTYPE html>

<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Ioki Parent</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="logo">

            <img
                src="assets/images/logo.png"
                alt="Ioki Parent"
            >

        </div>

        <h1>Ioki Parent</h1>

        <p class="subtitle">

            Beheer eenvoudig de instellingen van je kind.

        </p>

        <div class="card">

            <h2>Profiel koppelen</h2>

            <p>

                Vul hieronder het Profile-ID van je kind in.

            </p>

            <input
                type="text"
                id="profile-id"
                placeholder="Bijvoorbeeld: A7K9-X4M2"
                maxlength="9"
            >

            <button id="continue-button">

                Verder

            </button>

        </div>

        <div class="info">

            <h3>Wat gebeurt er hierna?</h3>

            <ul>

                <li>✔ We zoeken het profiel van je kind.</li>

                <li>✔ Er wordt een bevestigingsmail gestuurd.</li>

                <li>✔ Na bevestiging kun je instellingen aanpassen.</li>

            </ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
