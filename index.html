<!DOCTYPE html>

<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Ioki Parent</title>

    <link rel="stylesheet" href="style.css">


    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8400ff">
    
    <!-- iOS ondersteuning -->
    <link rel="apple-touch-icon" href="icons/logo-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

</head>

<body>

    <div class="container">

        <img
            src="assets/images/logo.png"
            class="logo"
        >

        <h1>Ioki Parent</h1>

        <p class="subtitle">

            Beheer de instellingen van je kinderen.

        </p>

        <!-- Niet ingelogd -->

        <div
            id="login-card"
            class="card"
        >

            <h2>

                Inloggen

            </h2>

            <p>

                Log in met je Google-account om verder te gaan.

            </p>

            <button id="google-login" class="button">

                Inloggen met Google

            </button>

        </div>

        <!-- Ingelogd -->

        <div
            id="parent-card"
            class="card hidden"
        >

            <h2>

                Welkom

            </h2>

            <p id="parent-email"></p>

            <h3>

                Jouw kinderen

            </h3>

            <div id="children-list">

            </div>

            <button id="add-child" class="button">

                + Kind koppelen

            </button>

            <button
                id="logout"
                class="button secondary"
            >

                Uitloggen

            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="script.js"></script>
    <script>

    if ("serviceWorker" in navigator){
    
        navigator.serviceWorker.register("sw.js");
    
    }
    
    </script>

</body>

</html>
