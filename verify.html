<!DOCTYPE html>

<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Ioki Parent</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="logo">

            <img
                src="assets/images/logo.png"
                alt="Ioki Parent"
            >

        </div>

        <h1>Controleer je e-mail</h1>

        <p class="subtitle">

            Er is een bevestiging nodig voordat je de instellingen kunt beheren.

        </p>

        <div class="card">

            <div class="mail-icon">

                📧

            </div>

            <h2>Wachten op bevestiging...</h2>

            <p id="status">

                We controleren automatisch of de koppeling is goedgekeurd.

            </p>

            <div class="spinner"></div>

        </div>

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="verify.js"></script>

</body>

</html>
